# ===============================
# Example Docker Compose file
# ===============================
#
# Purpose:
# --------
#
# This file is an example Docker Compose configuration for self hosting
# Maybe on your local machine or on a cloud VPS.
# The configuration below is a "standard" setup that works out of the box,
# but if you're running this outside of a local network, it is recommended
# to set the environment variables for extra security.
#

x-db-env: &db_env
  POSTGRES_USER: ${POSTGRES_USER:-kuria_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kuria_password}
  POSTGRES_DB: ${POSTGRES_DB:-kuria_production}

x-rails-env: &rails_env
  <<: *db_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  SELF_HOSTED: "true"
  RAILS_FORCE_SSL: "false"
  RAILS_ASSUME_SSL: "false"
  DB_HOST: db
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  OPENCODE_SERVER_URL: http://opencode:4096
  OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
  OPENCODE_DEFAULT_MODEL: ${OPENCODE_DEFAULT_MODEL:-opencode/minimax-m2.5-free}
  MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
  FREECRYPTO_API_KEY: ${FREECRYPTO_API_KEY}

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - app-storage:/rails/storage
    ports:
      - 3000:3000
    restart: unless-stopped
    environment:
      <<: *rails_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kuria_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: bundle exec sidekiq
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      opencode:
        condition: service_healthy
    environment:
      <<: *rails_env
    networks:
      - kuria_net

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      <<: *db_env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kuria_net

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kuria_net

  opencode:
    image: ghcr.io/anomalyco/opencode:dev
    container_name: maybe-opencode
    command: ["serve", "--port", "4096", "--hostname", "0.0.0.0"]
    restart: unless-stopped
    volumes:
      - opencode-config:/root/.config/opencode
    environment:
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4096/global/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kuria_net
    depends_on:
      web:
        condition: service_started

volumes:
  app-storage:
  postgres-data:
  redis-data:
  opencode-config:

networks:
  kuria_net:
    driver: bridge
